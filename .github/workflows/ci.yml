name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Lightweight verification for pull requests: compile, datagen, generated
  # resource check, and a single no-optional-dependencies GameTest run.
  pr-verify:
    name: PR verify (compile + datagen + no-optional GameTest)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Compile Java
        run: >-
          ./gradlew
          -I .github/gradle/exclude-jei-runtime.init.gradle
          compileJava
          --no-daemon
          --stacktrace

      - name: Regenerate data resources
        run: >-
          ./gradlew
          -I .github/gradle/exclude-jei-runtime.init.gradle
          runData
          --no-daemon
          --stacktrace

      - name: Check generated resources are current
        run: |
          set -euo pipefail
          if [[ -n "$(
            git status \
              --porcelain \
              --untracked-files=all \
              -- src/generated/resources
          )" ]]; then
            echo "::error::Generated resources under src/generated/resources are not up to date."
            git status --porcelain --untracked-files=all -- src/generated/resources
            exit 1
          fi

      - name: Start GameTest server without optional dependencies
        run: >-
          ./gradlew
          -I .github/gradle/exclude-optional-runtime.init.gradle
          runGameTestServer
          --no-daemon
          --stacktrace

      - name: Require executed and passing GameTests
        shell: bash
        run: |
          set -euo pipefail
          log_path="run/logs/latest.log"
          test -f "$log_path"
          ! grep -F "Failed to start the minecraft server" "$log_path"
          grep -E "All [1-9][0-9]* required tests passed" "$log_path"

  # Full build for main pushes: regen data, check resources, build the JAR,
  # then run all four runtime smoke profiles before releasing.
  build:
    name: Build and verify generated data
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      artifact_name: ${{ steps.metadata.outputs.artifact_name }}
      jar_name: ${{ steps.metadata.outputs.jar_name }}
      mod_version: ${{ steps.metadata.outputs.mod_version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Resolve KubeJS latest version
        id: kubejs
        shell: bash
        run: |
          set -euo pipefail
          kubejs_latest="$(sed -n 's/^kubejs_latest_version=//p' gradle.properties)"
          if [[ -z "$kubejs_latest" ]]; then
            echo "::error::kubejs_latest_version not defined in gradle.properties"
            exit 1
          fi
          echo "latest=${kubejs_latest}" >> "$GITHUB_OUTPUT"

      - name: Regenerate data resources
        run: >-
          ./gradlew
          -I .github/gradle/exclude-jei-runtime.init.gradle
          runData
          --no-daemon
          --stacktrace

      - name: Check generated resources are current
        run: |
          set -euo pipefail
          if [[ -n "$(
            git status \
              --porcelain \
              --untracked-files=all \
              -- src/generated/resources
          )" ]]; then
            echo "::error::Generated resources under src/generated/resources are not up to date."
            git status --porcelain --untracked-files=all -- src/generated/resources
            exit 1
          fi

      - name: Build JAR
        run: >-
          ./gradlew
          -I .github/gradle/exclude-jei-runtime.init.gradle
          build
          --no-daemon
          --stacktrace

      - name: Resolve build metadata
        id: metadata
        shell: bash
        run: |
          set -euo pipefail
          mod_id="$(sed -n 's/^mod_id=//p' gradle.properties)"
          mod_version="$(sed -n 's/^mod_version=//p' gradle.properties)"

          if [[ ! "$mod_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid mod_version: $mod_version" >&2
            exit 1
          fi

          jar_name="${mod_id}-${mod_version}.jar"
          test -f "build/libs/${jar_name}"
          echo "artifact_name=${mod_id}-v${mod_version}" >> "$GITHUB_OUTPUT"
          echo "jar_name=${jar_name}" >> "$GITHUB_OUTPUT"
          echo "mod_version=${mod_version}" >> "$GITHUB_OUTPUT"

      - name: Upload reobfuscated JAR
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.metadata.outputs.artifact_name }}
          path: build/libs/${{ steps.metadata.outputs.jar_name }}
          if-no-files-found: error
          retention-days: 30

  runtime-smoke:
    name: Runtime smoke (${{ matrix.profile }})
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        profile:
          - curios
          - no-optional-dependencies
          - kubejs-min
          - kubejs-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Resolve KubeJS latest version
        id: kubejs
        shell: bash
        run: |
          set -euo pipefail
          kubejs_latest="$(sed -n 's/^kubejs_latest_version=//p' gradle.properties)"
          if [[ -z "$kubejs_latest" ]]; then
            echo "::error::kubejs_latest_version not defined in gradle.properties"
            exit 1
          fi
          echo "latest=${kubejs_latest}" >> "$GITHUB_OUTPUT"

      - name: Start GameTest server with Curios
        if: matrix.profile == 'curios'
        run: >-
          ./gradlew
          -I .github/gradle/exclude-jei-runtime.init.gradle
          runGameTestServer
          --no-daemon
          --stacktrace

      - name: Start GameTest server without optional dependencies
        if: matrix.profile == 'no-optional-dependencies'
        run: >-
          ./gradlew
          -I .github/gradle/exclude-optional-runtime.init.gradle
          runGameTestServer
          --no-daemon
          --stacktrace

      - name: Start GameTest server with minimum KubeJS
        if: matrix.profile == 'kubejs-min'
        run: >-
          ./gradlew
          -I .github/gradle/exclude-non-kubejs-runtime.init.gradle
          -PenableKubeJSRuntime=true
          runGameTestServer
          --no-daemon
          --stacktrace

      - name: Start GameTest server with latest verified KubeJS
        if: matrix.profile == 'kubejs-latest'
        run: >-
          ./gradlew
          -I .github/gradle/exclude-non-kubejs-runtime.init.gradle
          -PenableKubeJSRuntime=true
          -Pkubejs_version=${{ steps.kubejs.outputs.latest }}
          runGameTestServer
          --no-daemon
          --stacktrace

      - name: Require executed and passing GameTests
        shell: bash
        run: |
          set -euo pipefail
          log_path="run/logs/latest.log"
          if [[ "${{ matrix.profile }}" == kubejs-* ]]; then
            log_path="build/kubejs-smoke/logs/latest.log"
          fi
          test -f "$log_path"
          ! grep -F "Failed to start the minecraft server" "$log_path"
          grep -E "All [1-9][0-9]* required tests passed" "$log_path"

  release:
    name: Publish versioned release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build, runtime-smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Check out repository and tags
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download validated JAR
        uses: actions/download-artifact@v5
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: release-artifact

      - name: Create annotated tag and GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JAR_NAME: ${{ needs.build.outputs.jar_name }}
          MOD_VERSION: ${{ needs.build.outputs.mod_version }}
        run: |
          set -euo pipefail
          tag="v${MOD_VERSION}"
          jar_path="release-artifact/${JAR_NAME}"
          test -f "$jar_path"

          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $tag already exists; keeping the workflow artifact only."
            exit 0
          fi

          git fetch --force --tags origin
          gh api \
            -H "Accept: application/vnd.github+json" \
            "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" \
            > associated-prs.json

          release_body="$(jq -r '.[0].body // empty' associated-prs.json)"
          if [[ -z "$release_body" ]]; then
            echo "A version release requires an associated PR body." >&2
            exit 1
          fi

          printf '%s\n' "$release_body" > release-body.md
          : > release-updates.md
          : > release-fixes.md

          awk '
            BEGIN {
              section = ""
              update_heading = 0
              fix_heading = 0
              item_count = 0
              invalid = 0
            }
            {
              line = $0
              sub(/\r$/, "", line)

              if (line == "## 更新") {
                if (update_heading++) {
                  print "Duplicate release heading: ## 更新" > "/dev/stderr"
                  invalid = 1
                }
                section = "update"
                next
              }
              if (line == "## 修复") {
                if (fix_heading++) {
                  print "Duplicate release heading: ## 修复" > "/dev/stderr"
                  invalid = 1
                }
                section = "fix"
                next
              }
              if (line ~ /^[[:space:]]*$/) {
                next
              }
              if (line ~ /^- [^[:space:]]/ && section == "update") {
                print line >> "release-updates.md"
                item_count++
                next
              }
              if (line ~ /^- [^[:space:]]/ && section == "fix") {
                print line >> "release-fixes.md"
                item_count++
                next
              }

              print "Invalid release note line: " line > "/dev/stderr"
              invalid = 1
            }
            END {
              if (item_count == 0) {
                print "Release notes require at least one update or fix." > "/dev/stderr"
                invalid = 1
              }
              exit invalid
            }
          ' release-body.md

          : > release-notes.md
          if [[ -s release-updates.md ]]; then
            printf '## 更新\n\n' >> release-notes.md
            cat release-updates.md >> release-notes.md
          fi
          if [[ -s release-fixes.md ]]; then
            if [[ -s release-notes.md ]]; then
              printf '\n' >> release-notes.md
            fi
            printf '## 修复\n\n' >> release-notes.md
            cat release-fixes.md >> release-notes.md
          fi
          cp release-notes.md tag-message.md

          if git rev-parse --verify --quiet "refs/tags/${tag}" >/dev/null; then
            tag_commit="$(git rev-list -n 1 "$tag")"
            if [[ "$tag_commit" != "$GITHUB_SHA" ]]; then
              echo "Tag $tag already points to $tag_commit; bump mod_version before release." >&2
              exit 1
            fi
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag --annotate "$tag" "$GITHUB_SHA" --file tag-message.md
            git push origin "refs/tags/${tag}"
          fi

          gh release create "$tag" \
            "${jar_path}#${JAR_NAME}" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "$tag" \
            --notes-file release-notes.md \
            --latest
