name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and verify generated data
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build reobfuscated JAR
        run: ./gradlew build --no-daemon --stacktrace

      - name: Regenerate data resources
        run: ./gradlew runData --no-daemon --stacktrace

      - name: Check generated resources are current
        run: git diff --exit-code -- src/generated/resources

  runtime-smoke:
    name: Runtime smoke (${{ matrix.profile }})
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        profile:
          - curios-and-jei
          - no-optional-dependencies

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Start GameTest server with Curios and JEI
        if: matrix.profile == 'curios-and-jei'
        run: ./gradlew runGameTestServer --no-daemon --stacktrace

      - name: Start GameTest server without optional dependencies
        if: matrix.profile == 'no-optional-dependencies'
        run: >-
          ./gradlew
          -I .github/gradle/exclude-optional-runtime.init.gradle
          runGameTestServer
          --no-daemon
          --stacktrace
