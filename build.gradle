plugins {
    id 'eclipse'
    id 'idea'
    id 'net.minecraftforge.gradle' version '[6.0.16,6.2)'
    id 'org.parchmentmc.librarian.forgegradle' version '1.+'
    id 'org.spongepowered.mixin' version '0.7.38'
}


group = mod_group_id
version = mod_version

def enableKubeJSRuntime = providers.gradleProperty('enableKubeJSRuntime')
        .map(String::toBoolean)
        .getOrElse(false)

base {
    archivesName = mod_id
}

java {
    toolchain.languageVersion = JavaLanguageVersion.of(17)
}

minecraft {
    mappings channel: mapping_channel, version: mapping_version
    copyIdeResources = true

    runs {
        configureEach {
            workingDirectory project.file('run')

            property 'forge.logging.markers', 'REGISTRIES'
            property 'forge.logging.console.level', 'debug'

            property 'mixin.env.remapRefMap', 'true'
            property 'mixin.env.refMapRemappingFile', "${projectDir}/build/createSrgToMcp/output.srg"

            mods {
                "${mod_id}" {
                    source sourceSets.main
                }
            }
        }

        client {
            property 'forge.enabledGameTestNamespaces', mod_id
        }

        server {
            property 'forge.enabledGameTestNamespaces', mod_id
            args '--nogui'
        }

        gameTestServer {
            property 'forge.enabledGameTestNamespaces', mod_id
            if (enableKubeJSRuntime) {
                workingDirectory layout.buildDirectory.dir('kubejs-smoke').get().asFile
            }
        }

        data {
            workingDirectory project.file('run-data')
            args '--mod', mod_id, '--all', '--output', file('src/generated/resources/'), '--existing', file('src/main/resources/')
        }
    }
}

sourceSets.main.resources {
    srcDir 'src/generated/resources'
    exclude '.cache/**' // Forge datagen 的本地缓存，不属于模组资源
    exclude 'cybercultivator-github.png' // 仅用于 GitHub 展示，不打包进 JAR
}

repositories {
    maven { url = 'https://maven.parchmentmc.org' }
    maven { url = 'https://maven.theillusivec4.top/' }
    maven { url = 'https://maven.blamejared.com/' }
    maven { url = 'https://maven.latvian.dev/releases' }
    maven { url = 'https://maven.architectury.dev/' }
}

dependencies {
    minecraft "net.minecraftforge:forge:${minecraft_version}-${forge_version}"

    annotationProcessor 'org.spongepowered:mixin:0.8.5:processor'

    compileOnly fg.deobf("top.theillusivec4.curios:curios-forge:${curios_version}:api")
    runtimeOnly fg.deobf("top.theillusivec4.curios:curios-forge:${curios_version}")

    compileOnly fg.deobf("mezz.jei:jei-${minecraft_version}-common-api:${jei_version}")
    compileOnly fg.deobf("mezz.jei:jei-${minecraft_version}-forge-api:${jei_version}")
    runtimeOnly fg.deobf("mezz.jei:jei-${minecraft_version}-forge:${jei_version}")

    // KubeJS integration is compile-only and isolated under compat/kubejs.
    // Enable the full development runtime explicitly with -PenableKubeJSRuntime=true.
    compileOnly fg.deobf("dev.latvian.mods:kubejs-forge:${kubejs_version}") { transitive = false }
    compileOnly fg.deobf("dev.latvian.mods:rhino-forge:${rhino_version}") { transitive = false }
    compileOnly fg.deobf("dev.architectury:architectury-forge:${architectury_version}") { transitive = false }

    if (enableKubeJSRuntime) {
        runtimeOnly fg.deobf("dev.latvian.mods:kubejs-forge:${kubejs_version}") { transitive = false }
        runtimeOnly fg.deobf("dev.latvian.mods:rhino-forge:${rhino_version}") { transitive = false }
        runtimeOnly fg.deobf("dev.architectury:architectury-forge:${architectury_version}") { transitive = false }
    }
}

mixin {
    add sourceSets.main, 'cybercultivator.refmap.json'
    config 'cybercultivator.mixins.json'
}

tasks.register('prepareKubeJSSmoke', Sync) {
    from('src/kubejsTest/resources/kubejs')
    into(layout.buildDirectory.dir('kubejs-smoke/kubejs'))
}

tasks.configureEach {
    if (name == 'runGameTestServer' && enableKubeJSRuntime) {
        dependsOn tasks.named('prepareKubeJSSmoke')
    }
}

tasks.named('processResources', ProcessResources).configure {
    var replaceProperties = [minecraft_version   : minecraft_version, minecraft_version_range: minecraft_version_range,
                             forge_version       : forge_version, forge_version_range: forge_version_range,
                             loader_version_range: loader_version_range,
                             mod_id              : mod_id, mod_name: mod_name, mod_license: mod_license, mod_version: mod_version,
                             mod_authors         : mod_authors, mod_description: mod_description,]

    inputs.properties replaceProperties

    filesMatching(['META-INF/mods.toml', 'pack.mcmeta']) {
        expand replaceProperties + [project: project]
    }
}

tasks.named('jar', Jar).configure {
    preserveFileTimestamps = false
    reproducibleFileOrder = true

    manifest {
        attributes(["Specification-Title"     : mod_id,
                    "Specification-Vendor"    : mod_authors,
                    "Specification-Version"   : "1",
                    "Implementation-Title"    : project.name,
                    "Implementation-Version"  : project.jar.archiveVersion,
                    "Implementation-Vendor"   : mod_authors])
    }
    finalizedBy 'reobfJar'
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}
